apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulsync-postgres
  namespace: soulsync
  labels:
    app: soulsync-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soulsync-postgres
  template:
    metadata:
      labels:
        app: soulsync-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: soulsync-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: soulsync-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soulsync-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu:    "250m"
            limits:
              memory: "512Mi"
              cpu:    "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: soulsync-postgres-service
  namespace: soulsync
spec:
  selector:
    app: soulsync-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
