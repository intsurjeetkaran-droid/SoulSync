apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulsync-frontend
  namespace: soulsync
  labels:
    app: soulsync-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soulsync-frontend
  template:
    metadata:
      labels:
        app: soulsync-frontend
    spec:
      containers:
        - name: frontend
          image: soulsync-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: soulsync-frontend-service
  namespace: soulsync
spec:
  selector:
    app: soulsync-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
